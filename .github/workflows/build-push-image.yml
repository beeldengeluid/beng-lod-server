name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@4258cc853923eea08c1282527f5e008ad5e55426 # v2026.04.25
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
