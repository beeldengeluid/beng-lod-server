name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@e2ab4c10024a7ead5b1bb99324a79d05886b3d02 # v2026.07.14
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
