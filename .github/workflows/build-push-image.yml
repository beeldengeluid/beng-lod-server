name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@b01364252dd74fdf461e6b58733fd778490b2a1c # v2026.02.24
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
