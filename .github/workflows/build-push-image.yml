name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@694c6351857e6f02b9c618ff0e7382de9cf31807 # v2026.05.15
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
