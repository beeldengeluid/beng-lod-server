name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@1b1e14939ae410fe73233e29fae4b3b4bfc62756 # v2026.05.29
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
