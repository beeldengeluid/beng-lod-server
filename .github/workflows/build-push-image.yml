name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@a4e774637cd2d9d3a61159b9c48e7740e730b005 # v2026.06.24
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
