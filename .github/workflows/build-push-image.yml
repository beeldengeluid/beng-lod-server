name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@b6f30f1432b66f967206290a5f9a62a45012f343 # v2026.04.03
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
