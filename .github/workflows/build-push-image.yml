name: Build & Push

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-image:
    uses: beeldengeluid/gha-workflows/.github/workflows/build-push-image.yml@c83e039444c290e8235d421749701f444b284477 # v2026.06.04
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
